<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ReelsTube: Real-Time Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --neon: #00f2ea; --bg: #0b0518; }
        body { margin:0; background: var(--bg); color:#fff; font-family: sans-serif; }
        
        /* Реальный счетчик онлайна */
        .online-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 30px;
            border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon);
            z-index: 1000; display: flex; align-items: center; gap: 10px;
        }
        .live-dot { width: 10px; height: 10px; background: #0f0; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        #online-val { font-weight: bold; font-size: 18px; color: var(--neon); }

        .profile-header { padding: 80px 20px 20px; text-align: center; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--neon); margin: 0 auto; background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .video-item { background: #111; border-radius: 10px; height: 200px; border: 1px solid #333; position: relative; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .btn-plus { width: 50px; height: 35px; background: var(--neon); border-radius: 10px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 28px; }
    </style>
</head>
<body>

    <div class="online-panel">
        <div class="live-dot"></div>
        <span>В СЕТИ: <span id="online-val">Загрузка...</span></span>
    </div>

    <div class="profile-header">
        <div class="avatar">👤</div>
        <h2>Мастер</h2>
        <p style="opacity:0.6;">Личный профиль v36.0</p>
    </div>

    <div class="video-grid" id="feed">
        <div class="video-item"></div>
        <div class="video-item"></div>
    </div>

    <div class="nav-bar">
        <div>🏠</div>
        <div class="btn-plus">+</div>
        <div style="color:var(--neon)">👤</div>
    </div>

    <script>
        // ТВОИ НАСТРОЙКИ FIREBASE (Вставь свои данные здесь)
        const firebaseConfig = {
            databaseURL: "https://nuristan778-gif-default-rtdb.firebaseio.com" // Укажи свой URL базы
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.database();
        const onlineRef = db.ref('.info/connected');
        const countRef = db.ref('online_users');

        // Логика реального счетчика
        onlineRef.on('value', (snapshot) => {
            if (snapshot.val() === true) {
                const userRef = countRef.push();
                // Когда пользователь уходит - удаляем его из базы
                userRef.onDisconnect().remove();
                userRef.set(true);
            }
        });

        // Слушаем изменения количества людей
        countRef.on('value', (snapshot) => {
            const count = snapshot.numChildren();
            document.getElementById('online-val').innerText = count.toLocaleString();
        });
    </script>
</body>
</html>
