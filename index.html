<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ReelsTube Global v40.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00f2ea; --pink: #ff007f; --bg: #060212; }
        body { margin:0; background: var(--bg); color:#fff; font-family: sans-serif; overflow: hidden; }
        
        /* Экраны и Защита */
        #bot-shield, #welcome-screen, #app-interface { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 100; }
        
        /* Лента видео */
        .video-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; border-bottom: 1px solid #222; }
        .video-overlay { position: absolute; bottom: 100px; left: 20px; text-shadow: 2px 2px 5px #000; }

        /* Студия Записи */
        .record-panel { padding: 20px; background: #111; border-radius: 20px; margin: 20px; border: 1px solid var(--neon); }
        .music-input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--pink); background: #000; color: #fff; }

        /* Кнопки */
        .btn { padding: 15px 30px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
        .btn-neon { background: var(--neon); color: #000; }
        .btn-pink { background: var(--pink); color: #fff; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 200; }
        .btn-plus { width: 55px; height: 38px; background: var(--neon); border-radius: 12px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 26px; }
    </style>
</head>
<body onload="initApp()">

    <div id="bot-shield" style="display: flex; align-items: center; justify-content: center;">
        <h2 style="color:var(--pink)">ПРОВЕРКА</h2>
        <button class="btn" style="background:#222; color:#fff" onclick="location.reload()">Я ВСЁ ПОНЯЛ</button>
        <button class="btn btn-neon" onclick="showWelcome()">Я НИЧЕГО НЕ ПОНЯЛ</button>
    </div>

    <div id="welcome-screen" style="align-items: center; justify-content: center;">
        <h1 style="color:var(--neon)">Добро пожаловать на ReelsTube</h1>
        <button class="btn btn-neon" onclick="enterApp('Guest')">ВОЙТИ КАК ГОСТЬ</button>
        <button class="btn btn-pink" onclick="enterApp('User')">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
    </div>

    <div id="app-interface">
        
        <div id="feed-section" class="video-feed">
            <div class="video-card">
                <div style="padding-top:45vh; text-align:center; color:#555;">🎥 Глобальное видео #1</div>
                <div class="video-overlay">
                    <b id="user-display">@User_0000</b>
                    <p>Трек: <span id="current-music">Оригинальный звук</span></p>
                    <button class="btn-neon" style="padding:5px 15px;" onclick="this.innerText='Вы подписаны'">Подписаться</button>
                </div>
            </div>
        </div>

        <div id="record-section" style="display:none; padding-top:50px; text-align:center;">
            <div class="record-panel">
                <h2 style="color:var(--neon)">ЗАПИСЬ</h2>
                <input type="text" id="music-search" class="music-input" placeholder="Поиск музыки или ссылка .mp3">
                <button class="btn btn-neon" onclick="loadMusic()">ПРОВЕРИТЬ МУЗЫКУ</button>
                <audio id="audio-preview" controls style="display:none; width:100%; margin:10px 0;"></audio>
                <br>
                <input type="file" id="camera" accept="video/*" capture="user" style="display:none;">
                <button class="btn btn-pink" onclick="document.getElementById('camera').click()">СНЯТЬ ВИДЕО</button>
            </div>
        </div>

        <div id="profile-section" style="display:none; padding:50px; text-align:center;">
            <div style="font-size:60px;">👤</div>
            <h2 id="profile-name">User_0000</h2>
            <button class="btn btn-neon" onclick="changeName()">ИЗМЕНИТЬ ИМЯ</button>
        </div>

        <div class="nav-bar">
            <div onclick="showTab('feed')">🏠</div>
            <div class="btn-plus" onclick="showTab('record')">+</div>
            <div onclick="showTab('profile')">👤</div>
        </div>
    </div>

    <script>
        let userName = "";

        function initApp() {
            // Генерация имени
            if(!localStorage.getItem('rt_user')) {
                localStorage.setItem('rt_user', "User_" + Math.floor(Math.random()*899999 + 100000));
            }
            userName = localStorage.getItem('rt_user');
            document.getElementById('user-display').innerText = "@" + userName;
            document.getElementById('profile-name').innerText = userName;
        }

        function showWelcome() {
            document.getElementById('bot-shield').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
        }

        function enterApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
        }

        function showTab(tab) {
            document.getElementById('feed-section').style.display = tab === 'feed' ? 'block' : 'none';
            document.getElementById('record-section').style.display = tab === 'record' ? 'block' : 'none';
            document.getElementById('profile-section').style.display = tab === 'profile' ? 'block' : 'none';
        }

        function loadMusic() {
            let url = document.getElementById('music-search').value;
            if(url.startsWith('http')) {
                let player = document.getElementById('audio-preview');
                player.src = url;
                player.style.display = 'block';
                document.getElementById('current-music').innerText = "По ссылке";
                alert("Музыка загружена!");
            } else {
                alert("Введите прямую ссылку на музыку (.mp3)");
            }
        }

        function changeName() {
            let newName = prompt("Новое имя:", userName);
            if(newName) {
                localStorage.setItem('rt_user', newName);
                location.reload();
            }
        }
    </script>
</body>
</html>
