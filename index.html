<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ReelsTube Cloud v41.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00f2ea; --pink: #ff007f; --bg: #060212; }
        body { margin:0; background: var(--bg); color:#fff; font-family: sans-serif; overflow: hidden; }
        
        /* Экраны */
        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .active { display: flex !important; }

        /* Видео карточка */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; width: 100%; }
        .v-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; border-bottom: 1px solid #222; }
        .v-ui { position: absolute; bottom: 100px; left: 20px; right: 20px; }
        .actions { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; text-align: center; }

        /* Кнопки */
        .btn { padding: 12px 25px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-neon { background: var(--neon); color: #000; }
        .btn-pink { background: var(--pink); color: #fff; }
        .input-box { width: 80%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid var(--neon); background: #000; color: #fff; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 200; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="shield-screen" class="screen active">
        <h2 style="color:var(--pink)">ПРОВЕРКА</h2>
        <button class="btn" style="background:#222; color:#fff" onclick="location.reload()">Я ВСЁ ПОНЯЛ</button>
        <button class="btn btn-neon" onclick="goWelcome()">Я НИЧЕГО НЕ ПОНЯЛ</button>
    </div>

    <div id="auth-screen" class="screen">
        <h2 id="auth-title">Создать Аккаунт</h2>
        <input type="text" id="reg-name" class="input-box" placeholder="Придумайте имя (или останется User_...)">
        <input type="password" id="reg-pass" class="input-box" placeholder="Придумайте пароль">
        <button class="btn btn-neon" onclick="register()">НАЧАТЬ</button>
    </div>

    <div id="main-app" style="display:none;">
        <div id="video-feed" class="feed">
            <div class="v-card">
                <div style="padding-top:40vh; text-align:center; color:#444;">Листайте вверх для видео</div>
                <div class="v-ui"><b>@ReelsTube_Bot</b><p>Добро пожаловать в глобальную сеть!</p></div>
                <div class="actions">
                    <div onclick="alert('Лайк поставлен!')">❤️<br><small>1.2k</small></div>
                    <div onclick="alert('Комменты скоро!')">💬<br><small>42</small></div>
                </div>
            </div>
        </div>

        <div class="nav">
            <div onclick="showTab('feed')">🏠</div>
            <div style="font-size:30px; background:var(--neon); color:#000; width:50px; height:35px; border-radius:10px; display:flex; justify-content:center; align-items:center;" onclick="showTab('record')">+</div>
            <div onclick="showTab('profile')">👤</div>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div style="font-size:60px;">👤</div>
        <h2 id="my-name">User_0000</h2>
        <button class="btn btn-neon" onclick="alert('В разработке: редактирование')">РЕДАКТИРОВАТЬ</button>
        <button class="btn btn-pink" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</button>
    </div>

    <script>
        // Инициализация Firebase (Твоя база)
        const firebaseConfig = { databaseURL: "https://nuristan778-gif-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkAuth() {
            if(localStorage.getItem('rt_logged') === 'true') {
                showApp();
            }
        }

        function goWelcome() {
            document.getElementById('shield-screen').classList.remove('active');
            if(localStorage.getItem('rt_logged') === 'true') { showApp(); } 
            else { document.getElementById('auth-screen').classList.add('active'); }
        }

        function register() {
            let name = document.getElementById('reg-name').value || "User_" + Math.floor(Math.random()*9999);
            let pass = document.getElementById('reg-pass').value;
            if(pass.length < 4) return alert("Пароль слишком короткий!");
            
            localStorage.setItem('rt_name', name);
            localStorage.setItem('rt_pass', pass);
            localStorage.setItem('rt_logged', 'true');
            showApp();
        }

        function showApp() {
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('my-name').innerText = localStorage.getItem('rt_name');
        }

        function showTab(tab) {
            document.getElementById('video-feed').style.display = tab === 'feed' ? 'block' : 'none';
            document.getElementById('profile-screen').classList.toggle('active', tab === 'profile');
        }

        function logout() {
            localStorage.setItem('rt_logged', 'false');
            location.reload();
        }

        // Логика подгрузки видео из Firebase будет здесь в v42
    </script>
</body>
</html>
